<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор РЖД</title>
    <meta name="description" content="Калькулятор норм расхода электроэнергии РЖД">
    <meta name="theme-color" content="#0061A4">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #ffffff;
            --surface: #f5f5f5;
            --text: #1a1a1a;
            --text-secondary: #666666;
            --border: #e0e0e0;
            --primary: #0061A4;
            --primary-hover: #004d8a;
            --error: #d32f2f;
            --success: #388e3c;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #121212;
                --surface: #1e1e1e;
                --text: #ffffff;
                --text-secondary: #aaaaaa;
                --border: #333333;
                --primary: #4dabf7;
                --primary-hover: #339af0;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            padding: 16px;
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 24px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .section {
            background: var(--surface);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 12px;
        }

        label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        select, input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            background: var(--bg);
            color: var(--text);
            margin-bottom: 12px;
        }

        select:focus, input:focus {
            outline: 2px solid var(--primary);
            border-color: transparent;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .input-row label {
            margin-bottom: 4px;
        }

        .input-row input {
            margin-bottom: 0;
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .btn-group {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .traction-btn {
            flex: 1;
            padding: 8px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        .traction-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .locomotive-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .locomotive-card:hover {
            border-color: var(--primary);
        }

        .locomotive-card.selected {
            border-color: var(--primary);
            background: rgba(0, 97, 164, 0.1);
        }

        .locomotive-info h3 {
            font-size: 14px;
            font-weight: 500;
        }

        .locomotive-info p {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .remove-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
            padding: 4px 8px;
        }

        .remove-btn:hover {
            color: var(--error);
        }

        .results {
            background: var(--surface);
            border-radius: 8px;
            padding: 16px;
            margin-top: 16px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-label {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .result-value {
            font-weight: 600;
            font-size: 14px;
        }

        .result-value.main {
            font-size: 20px;
            color: var(--primary);
        }

        .actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .actions button {
            flex: 1;
            min-width: 120px;
        }

        .hidden {
            display: none;
        }

        .locomotive-options {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 8px;
            margin-top: 8px;
            padding: 8px;
            background: var(--bg);
            border-radius: 6px;
        }

        .locomotive-option {
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
            font-size: 12px;
        }

        .locomotive-option:hover {
            border-color: var(--primary);
            background: rgba(0, 97, 164, 0.05);
        }

        .route-info {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        .route-info strong {
            color: var(--text);
        }

        .fuel-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .fuel-table th, .fuel-table td {
            padding: 8px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .fuel-table th {
            background: var(--bg);
            font-weight: 500;
        }

        .fuel-table input {
            width: 100%;
            padding: 4px;
            margin: 0;
            font-size: 12px;
        }

        .history-item {
            padding: 12px;
            background: var(--bg);
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .history-item .date {
            color: var(--text-secondary);
            font-size: 11px;
            margin-bottom: 4px;
        }

        @media (max-width: 480px) {
            body {
                padding: 12px;
            }

            h1 {
                font-size: 20px;
            }

            .input-row {
                grid-template-columns: 1fr;
            }

            .actions {
                flex-direction: column;
            }

            .actions button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>🚂 Калькулятор РЖД</h1>
        <p class="subtitle">Расход электроэнергии на тягу поездов</p>
    </header>

    <main>
        <!-- Маршрут -->
        <section class="section">
            <h2 class="section-title">Маршрут</h2>
            <label for="route">Выберите маршрут</label>
            <select id="route">
                <option value="">Загрузка маршрутов...</option>
            </select>
            <div id="routeInfo" class="route-info hidden"></div>
        </section>

        <!-- Локомотивы -->
        <section class="section">
            <h2 class="section-title">Локомотивы</h2>
            <div class="btn-group">
                <button class="traction-btn active" data-type="electric">⚡ Электровозы</button>
                <button class="traction-btn" data-type="diesel">⛽ Тепловозы</button>
            </div>
            <div class="btn-group">
                <button class="btn-secondary" id="addLocoBtn">+ Локомотив</button>
                <button class="btn-secondary" id="addColdBtn">+ Холодный</button>
            </div>
            <div id="locomotiveContainer"></div>
        </section>

        <!-- Параметры поезда -->
        <section class="section">
            <h2 class="section-title">Параметры поезда</h2>
            <div class="input-row">
                <div>
                    <label for="trainWeight">Вес (тонн)</label>
                    <input type="number" id="trainWeight" min="100" max="10000" step="1">
                </div>
                <div>
                    <label for="axleCount">Оси</label>
                    <input type="number" id="axleCount" min="10" max="500" step="1">
                </div>
            </div>
            <div class="input-row">
                <div>
                    <label for="actualWagons">Факт. вагоны</label>
                    <input type="number" id="actualWagons" min="0" max="1000" step="1">
                </div>
                <div>
                    <label for="conditionalWagons">Условн. вагоны</label>
                    <input type="number" id="conditionalWagons" min="0" max="1000" step="1">
                </div>
            </div>
        </section>

        <!-- Расчет топлива (для тепловозов) -->
        <section class="section hidden" id="fuelSection">
            <h2 class="section-title">Расчет топлива</h2>
            <table class="fuel-table">
                <thead>
                    <tr>
                        <th>Коэфф.</th>
                        <th colspan="2">Секция А</th>
                        <th colspan="2">Секция Б</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>
                            <input type="number" id="fuelCoeff" value="0.842" step="0.001" min="0" max="2">
                        </td>
                        <td><input type="number" id="fuelA1" placeholder="Бак 1" min="0"></td>
                        <td><input type="number" id="fuelA2" placeholder="Бак 2" min="0"></td>
                        <td><input type="number" id="fuelB1" placeholder="Бак 1" min="0"></td>
                        <td><input type="number" id="fuelB2" placeholder="Бак 2" min="0"></td>
                    </tr>
                    <tr>
                        <td></td>
                        <td colspan="2" id="fuelAResult">0 л / 0 кг</td>
                        <td colspan="2" id="fuelBResult">0 л / 0 кг</td>
                    </tr>
                </tbody>
            </table>
        </section>

        <!-- Результаты -->
        <section class="results hidden" id="resultsSection">
            <div class="result-item">
                <span class="result-label">Норма расхода</span>
                <span class="result-value main" id="consumptionResult">0 кВт⋅ч</span>
            </div>
            <div class="result-item">
                <span class="result-label">Нагрузка на ось</span>
                <span class="result-value" id="axleLoadResult">0 т/ось</span>
            </div>
            <div class="result-item">
                <span class="result-label">Длина состава</span>
                <span class="result-value" id="trainLengthResult">0 м</span>
            </div>
            <div class="actions">
                <button class="btn-secondary" id="exportBtn">📥 Экспорт</button>
                <button class="btn-secondary" id="saveHistoryBtn">💾 В историю</button>
                <button class="btn-secondary" id="showHistoryBtn">📋 История</button>
            </div>
        </section>

        <!-- История -->
        <section class="section hidden" id="historySection">
            <h2 class="section-title">История расчетов</h2>
            <div id="historyList"></div>
            <div class="actions">
                <button class="btn-secondary" id="clearHistoryBtn">🗑️ Очистить</button>
            </div>
        </section>
    </main>

    <script>
        // === ДАННЫЕ ===
        const LOCOMOTIVE_DATA = {
            vl10: { name: 'ВЛ10', length: 32 },
            vl10u: { name: 'ВЛ10У', length: 32 },
            vl10k: { name: 'ВЛ10К', length: 30 },
            vl10uk: { name: 'ВЛ10УК', length: 32 },
            '2es6': { name: '2ЭС6', length: 34 },
            '2te10m': { name: '2ТЭ10М', length: 34 },
            '2te25km': { name: '2ТЭ25КМ', length: 34 },
            'tep70bs': { name: 'ТЭП70БС', length: 21 },
            '3te10m': { name: '3ТЭ10М', length: 51 }
        };

        const WAGON_LENGTH = 14;

        const STANDARD_COEFFICIENTS = {
            vl10u: { 6: 89.5, 7: 83.41, 8: 78.85, 9: 75.29, 10: 72.45, 11: 70.13, 12: 68.19, 13: 66.55, 14: 65.15 },
            '2es6': { 6: 82.0, 7: 76.43, 8: 72.26, 9: 69.01, 10: 66.41, 11: 64.29, 12: 62.52, 13: 61.02, 14: 59.73 },
            vl10: { 6: 89.5, 7: 83.41, 8: 78.85, 9: 75.29, 10: 72.45, 11: 70.13, 12: 68.19, 13: 66.55, 14: 65.15 },
            vl10k: { 6: 89.5, 7: 83.41, 8: 78.85, 9: 75.29, 10: 72.45, 11: 70.13, 12: 68.19, 13: 66.55, 14: 65.15 },
            vl10uk: { 6: 89.5, 7: 83.41, 8: 78.85, 9: 75.29, 10: 72.45, 11: 70.13, 12: 68.19, 13: 66.55, 14: 65.15 }
        };

        let ROUTE_DATA = {};
        let locomotiveCounter = 0;
        let locomotives = {};
        let currentTraction = 'electric';
        let currentResult = null;

        // === ЗАГРУЗКА МАРШРУТОВ ===
        async function loadRoutes() {
            const routeFiles = [
                'abdulino-dema.md', 'abdulino-kinel.md', 'abdulino-oktyabrsk-south.md',
                'abdulino-oktyabrsk.md', 'abdulino-syzran-south.md', 'abdulino-syzran.md',
                'kinel-abdulino.md', 'oktyabrsk-abdulino-south.md', 'oktyabrsk-abdulino.md',
                'syzran-abdulino-south.md', 'syzran-abdulino.md'
            ];

            for (const file of routeFiles) {
                try {
                    const response = await fetch(`./data/${file}`);
                    if (response.ok) {
                        const content = await response.text();
                        const route = parseRouteMarkdown(content, file);
                        if (route) {
                            const routeId = file.replace('.md', '');
                            ROUTE_DATA[routeId] = route;
                        }
                    }
                } catch (e) {
                    console.warn(`Не загружен ${file}:`, e.message);
                }
            }

            updateRouteSelect();
        }

        function parseRouteMarkdown(content, filename) {
            const lines = content.split('\n');
            const route = { name: '', distance: 0, travelTime: 0, coefficients: {} };

            for (const line of lines) {
                const trimmed = line.trim();
                if (trimmed.startsWith('# ') && !trimmed.startsWith('##')) {
                    route.name = trimmed.substring(2).trim();
                } else if (trimmed.startsWith('-')) {
                    const distMatch = trimmed.match(/-\s*(\d+)\s*км/);
                    if (distMatch) route.distance = parseInt(distMatch[1]);
                    const timeMatch = trimmed.match(/-\s*(\d+[,.]\d+)\s*час/);
                    if (timeMatch) route.travelTime = parseFloat(timeMatch[1].replace(',', '.'));
                } else if (trimmed.startsWith('|') && trimmed.includes('ВЛ10У')) {
                    const cells = trimmed.split('|').map(c => c.trim()).filter(c => c);
                    for (let i = 1; i < cells.length; i++) {
                        const coeff = parseFloat(cells[i]);
                        if (!isNaN(coeff)) route.coefficients['vl10u'] = route.coefficients['vl10u'] || {};
                        if (route.coefficients['vl10u']) route.coefficients['vl10u'][i + 5] = coeff;
                    }
                } else if (trimmed.startsWith('|') && trimmed.includes('2ЭС6')) {
                    const cells = trimmed.split('|').map(c => c.trim()).filter(c => c);
                    for (let i = 1; i < cells.length; i++) {
                        const coeff = parseFloat(cells[i]);
                        if (!isNaN(coeff)) route.coefficients['2es6'] = route.coefficients['2es6'] || {};
                        if (route.coefficients['2es6']) route.coefficients['2es6'][i + 5] = coeff;
                    }
                }
            }

            return route.name && route.distance ? route : null;
        }

        function updateRouteSelect() {
            const select = document.getElementById('route');
            select.innerHTML = '<option value="">-- Выберите маршрут --</option>';
            for (const [id, route] of Object.entries(ROUTE_DATA)) {
                const option = document.createElement('option');
                option.value = id;
                option.textContent = `${route.name} (${route.distance} км)`;
                select.appendChild(option);
            }
            select.addEventListener('change', () => {
                displayRouteInfo();
                calculate();
            });
        }

        function displayRouteInfo() {
            const select = document.getElementById('route');
            const infoDiv = document.getElementById('routeInfo');
            const route = ROUTE_DATA[select.value];

            if (route) {
                infoDiv.innerHTML = `Расстояние: <strong>${route.distance} км</strong>${route.travelTime ? `, Время: <strong>${route.travelTime} ч</strong>` : ''}`;
                infoDiv.classList.remove('hidden');
            } else {
                infoDiv.classList.add('hidden');
            }
        }

        // === ЛОКОМОТИВЫ ===
        function addLocomotive(isCold = false) {
            locomotiveCounter++;
            const id = locomotiveCounter;
            const container = document.getElementById('locomotiveContainer');

            const defaultType = currentTraction === 'electric' ? 'vl10u' : '2te10m';
            const defaultLoco = LOCOMOTIVE_DATA[defaultType];

            locomotives[id] = {
                type: isCold ? 'cold' : defaultType,
                length: isCold ? 34 : defaultLoco.length,
                isCold: isCold
            };

            const card = document.createElement('div');
            card.className = 'locomotive-card';
            card.id = `locoCard${id}`;
            card.innerHTML = `
                <div class="locomotive-info">
                    <h3>${isCold ? 'Х' : defaultLoco.name}</h3>
                    <p>Длина: ${locomotives[id].length}м</p>
                </div>
                <button class="remove-btn" onclick="removeLocomotive(${id})">×</button>
            `;
            card.onclick = (e) => {
                if (!e.target.classList.contains('remove-btn')) {
                    showLocomotiveOptions(id);
                }
            };

            container.appendChild(card);
            calculate();
        }

        function removeLocomotive(id) {
            delete locomotives[id];
            document.getElementById(`locoCard${id}`).remove();
            calculate();
        }

        function showLocomotiveOptions(id) {
            const card = document.getElementById(`locoCard${id}`);
            let existing = card.querySelector('.locomotive-options');
            if (existing) {
                existing.remove();
                return;
            }

            const options = document.createElement('div');
            options.className = 'locomotive-options';

            const types = currentTraction === 'electric'
                ? ['vl10', 'vl10u', 'vl10k', 'vl10uk', '2es6']
                : ['2te10m', '2te25km', 'tep70bs', '3te10m'];

            for (const type of types) {
                const loco = LOCOMOTIVE_DATA[type];
                const opt = document.createElement('div');
                opt.className = 'locomotive-option';
                opt.textContent = `${loco.name} (${loco.length}м)`;
                opt.onclick = () => selectLocomotiveType(id, type);
                options.appendChild(opt);
            }

            // Опция для холодного локомотива
            const coldOpt = document.createElement('div');
            coldOpt.className = 'locomotive-option';
            coldOpt.textContent = 'Х (холодный)';
            coldOpt.onclick = () => selectLocomotiveType(id, 'cold');
            options.appendChild(coldOpt);

            card.appendChild(options);
        }

        function selectLocomotiveType(id, type) {
            if (type === 'cold') {
                locomotives[id] = { type: 'cold', length: 34, isCold: true };
            } else {
                const loco = LOCOMOTIVE_DATA[type];
                locomotives[id] = { type, length: loco.length, isCold: false };
            }

            const card = document.getElementById(`locoCard${id}`);
            const info = card.querySelector('.locomotive-info');
            info.querySelector('h3').textContent = type === 'cold' ? 'Х' : loco.name;
            info.querySelector('p').textContent = `Длина: ${locomotives[id].length}м`;

            card.querySelector('.locomotive-options')?.remove();
            calculate();
        }

        // === РАСЧЕТ ===
        function getCoefficient(locoType, axleLoad, route) {
            if (route && route.coefficients && route.coefficients[locoType]) {
                const coeffs = route.coefficients[locoType];
                const rounded = Math.round(axleLoad);
                if (coeffs[rounded]) return coeffs[rounded];
                const loads = Object.keys(coeffs).map(Number).sort((a, b) => a - b);
                if (loads.length) {
                    const closest = loads.reduce((prev, curr) =>
                        Math.abs(curr - rounded) < Math.abs(prev - rounded) ? curr : prev
                    );
                    return coeffs[closest];
                }
            }

            const standard = STANDARD_COEFFICIENTS[locoType];
            if (standard) {
                const rounded = Math.round(axleLoad);
                if (standard[rounded]) return standard[rounded];
                const loads = Object.keys(standard).map(Number).sort((a, b) => a - b);
                if (loads.length) {
                    const closest = loads.reduce((prev, curr) =>
                        Math.abs(curr - rounded) < Math.abs(prev - rounded) ? curr : prev
                    );
                    return standard[closest];
                }
            }
            return 70; // fallback
        }

        function calculate() {
            const weight = parseFloat(document.getElementById('trainWeight').value) || 0;
            const axles = parseFloat(document.getElementById('axleCount').value) || 0;
            const actualWagons = parseInt(document.getElementById('actualWagons').value) || 0;
            const conditionalWagons = parseInt(document.getElementById('conditionalWagons').value) || 0;
            const route = ROUTE_DATA[document.getElementById('route').value];

            if (!weight && !axles && !conditionalWagons && !Object.keys(locomotives).length) {
                document.getElementById('resultsSection').classList.add('hidden');
                return;
            }

            // Длина состава
            let trainLength = 0;
            for (const loco of Object.values(locomotives)) {
                trainLength += loco.length;
            }
            trainLength += conditionalWagons * WAGON_LENGTH;

            // Нагрузка на ось и коэффициент
            let axleLoad = 0;
            let coefficient = 0;
            let energyConsumption = null;

            if (weight && axles) {
                axleLoad = weight / axles;

                // Находим активный локомотив для коэффициента
                const activeLoco = Object.values(locomotives).find(l => !l.isCold);
                if (activeLoco && activeLoco.type !== 'cold') {
                    coefficient = getCoefficient(activeLoco.type, axleLoad, route);
                    const distance = route ? route.distance : 0;
                    energyConsumption = (weight * coefficient * distance) / 10000 / 100;
                }
            }

            // Отображение
            currentResult = { trainLength, axleLoad, energyConsumption, coefficient, route };
            displayResults();
        }

        function displayResults() {
            const section = document.getElementById('resultsSection');
            section.classList.remove('hidden');

            if (currentResult.energyConsumption !== null) {
                document.getElementById('consumptionResult').textContent =
                    `${currentResult.energyConsumption.toFixed(2)} кВт⋅ч`;
            }

            if (currentResult.axleLoad) {
                document.getElementById('axleLoadResult').textContent =
                    `${currentResult.axleLoad.toFixed(2)} т/ось`;
            }

            if (currentResult.trainLength) {
                document.getElementById('trainLengthResult').textContent =
                    `${Math.round(currentResult.trainLength)} м`;
            }
        }

        // === ТОПЛИВО ===
        function calculateFuel() {
            const coeff = parseFloat(document.getElementById('fuelCoeff').value) || 0.842;
            const a1 = parseFloat(document.getElementById('fuelA1').value) || 0;
            const a2 = parseFloat(document.getElementById('fuelA2').value) || 0;
            const b1 = parseFloat(document.getElementById('fuelB1').value) || 0;
            const b2 = parseFloat(document.getElementById('fuelB2').value) || 0;

            const avgA = (a1 + a2) / 2;
            const avgB = (b1 + b2) / 2;
            const kgA = avgA * coeff;
            const kgB = avgB * coeff;

            document.getElementById('fuelAResult').textContent = `${avgA.toFixed(0)} л / ${kgA.toFixed(0)} кг`;
            document.getElementById('fuelBResult').textContent = `${avgB.toFixed(0)} л / ${kgB.toFixed(0)} кг`;
        }

        // === ИСТОРИЯ ===
        function getHistory() {
            return JSON.parse(localStorage.getItem('rzdHistory') || '[]');
        }

        function saveToHistory() {
            if (!currentResult || !currentResult.energyConsumption) return;

            const history = getHistory();
            const entry = {
                date: new Date().toISOString(),
                route: currentResult.route?.name || 'Без маршрута',
                consumption: currentResult.energyConsumption.toFixed(2),
                axleLoad: currentResult.axleLoad?.toFixed(2),
                length: Math.round(currentResult.trainLength)
            };

            history.unshift(entry);
            if (history.length > 10) history.length = 10;
            localStorage.setItem('rzdHistory', JSON.stringify(history));
            showHistory();
        }

        function showHistory() {
            const section = document.getElementById('historySection');
            const list = document.getElementById('historyList');
            const history = getHistory();

            if (!history.length) {
                section.classList.add('hidden');
                return;
            }

            section.classList.remove('hidden');
            list.innerHTML = history.map(item => `
                <div class="history-item">
                    <div class="date">${new Date(item.date).toLocaleString('ru-RU')}</div>
                    <div>Маршрут: ${item.route}</div>
                    <div>Расход: ${item.consumption} кВт⋅ч | Ось: ${item.axleLoad} т/ось | Длина: ${item.length} м</div>
                </div>
            `).join('');
        }

        function clearHistory() {
            localStorage.removeItem('rzdHistory');
            showHistory();
        }

        // === ЭКСПОРТ ===
        function exportResult() {
            if (!currentResult) return;

            const text = `
РЖД Калькулятор - Результат расчета
Дата: ${new Date().toLocaleString('ru-RU')}

Маршрут: ${currentResult.route?.name || 'Не выбран'}
Расстояние: ${currentResult.route?.distance || 0} км

Норма расхода: ${currentResult.energyConsumption?.toFixed(2) || 0} кВт⋅ч
Нагрузка на ось: ${currentResult.axleLoad?.toFixed(2) || 0} т/ось
Длина состава: ${Math.round(currentResult.trainLength || 0)} м
Коэффициент: ${currentResult.coefficient?.toFixed(2) || 0}
            `.trim();

            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `rzd-result-${Date.now()}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // === СОБЫТИЯ ===
        document.getElementById('addLocoBtn').onclick = () => addLocomotive(false);
        document.getElementById('addColdBtn').onclick = () => addLocomotive(true);
        document.getElementById('exportBtn').onclick = exportResult;
        document.getElementById('saveHistoryBtn').onclick = saveToHistory;
        document.getElementById('showHistoryBtn').onclick = showHistory;
        document.getElementById('clearHistoryBtn').onclick = clearHistory;

        document.querySelectorAll('.traction-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.traction-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTraction = btn.dataset.type;
                document.getElementById('fuelSection').classList.toggle('hidden', currentTraction === 'electric');
            };
        });

        ['fuelCoeff', 'fuelA1', 'fuelA2', 'fuelB1', 'fuelB2'].forEach(id => {
            document.getElementById(id).addEventListener('input', calculateFuel);
        });

        ['trainWeight', 'axleCount', 'actualWagons', 'conditionalWagons'].forEach(id => {
            document.getElementById(id).addEventListener('input', calculate);
        });

        // === ИНИЦИАЛИЗАЦИЯ ===
        loadRoutes();

        // Service Worker для офлайн работы
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(() => {});
        }
    </script>
</body>
</html>
