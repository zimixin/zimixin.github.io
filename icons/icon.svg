<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0061A4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0078D4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="trainGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8F4FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bgGradient)"/>
  
  <!-- Train icon (Material Design style) -->
  <g transform="translate(106, 120)">
    <!-- Main locomotive body -->
    <rect x="0" y="60" width="300" height="180" rx="24" fill="url(#trainGradient)"/>
    
    <!-- Front window -->
    <rect x="40" y="90" width="220" height="80" rx="12" fill="#0061A4"/>
    
    <!-- Window reflection -->
    <rect x="50" y="100" width="100" height="30" rx="6" fill="rgba(255,255,255,0.3)"/>
    
    <!-- Headlights -->
    <circle cx="60" cy="200" r="12" fill="#FFD700"/>
    <circle cx="240" cy="200" r="12" fill="#FFD700"/>
    
    <!-- Grill -->
    <rect x="80" y="230" width="140" height="10" rx="4" fill="#0061A4"/>
    <rect x="80" y="245" width="140" height="10" rx="4" fill="#0061A4"/>
    
    <!-- Wheels -->
    <circle cx="70" cy="260" r="24" fill="#333333"/>
    <circle cx="150" cy="260" r="24" fill="#333333"/>
    <circle cx="230" cy="260" r="24" fill="#333333"/>
    
    <!-- Wheel centers -->
    <circle cx="70" cy="260" r="10" fill="#666666"/>
    <circle cx="150" cy="260" r="10" fill="#666666"/>
    <circle cx="230" cy="260" r="10" fill="#666666"/>
    
    <!-- Pantograph (energy symbol for electric train) -->
    <path d="M100 60 L120 30 L140 60" stroke="#FFD700" stroke-width="6" stroke-linecap="round" fill="none"/>
    <line x1="120" y1="30" x2="120" y2="10" stroke="#FFD700" stroke-width="6" stroke-linecap="round"/>
  </g>
  
  <!-- Rail tracks -->
  <rect x="60" y="380" width="392" height="12" rx="6" fill="#666666"/>
  <rect x="60" y="405" width="392" height="12" rx="6" fill="#666666"/>
  
  <!-- Rail ties -->
  <rect x="80" y="375" width="16" height="47" rx="4" fill="#8B4513"/>
  <rect x="130" y="375" width="16" height="47" rx="4" fill="#8B4513"/>
  <rect x="180" y="375" width="16" height="47" rx="4" fill="#8B4513"/>
  <rect x="230" y="375" width="16" height="47" rx="4" fill="#8B4513"/>
  <rect x="280" y="375" width="16" height="47" rx="4" fill="#8B4513"/>
  <rect x="330" y="375" width="16" height="47" rx="4" fill="#8B4513"/>
  <rect x="380" y="375" width="16" height="47" rx="4" fill="#8B4513"/>
  <rect x="430" y="375" width="16" height="47" rx="4" fill="#8B4513"/>
</svg>
