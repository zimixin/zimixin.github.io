<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль Пути - КМБУ</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Consolas', 'Monaco', monospace;
            background: #0a0a0f;
            color: #c5c6c7;
            height: 100vh;
            overflow: hidden;
        }
        .container { display: flex; flex-direction: column; height: 100vh; }
        header {
            background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1a 100%);
            border-bottom: 2px solid #16213e;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .station-name {
            background: #16213e;
            padding: 8px 16px;
            border-radius: 4px;
            color: #66fcf1;
            font-size: 14px;
            font-weight: bold;
        }
        h1 { font-size: 16px; color: #66fcf1; text-transform: uppercase; letter-spacing: 2px; }
        .controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        button {
            background: #16213e;
            border: 1px solid #0f3460;
            color: #66fcf1;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            transition: all 0.2s;
        }
        button:hover { background: #0f3460; border-color: #66fcf1; }
        .data-selector select, .path-selector select, .speed-type-selector select {
            background: #16213e;
            border: 1px solid #0f3460;
            color: #66fcf1;
            padding: 8px 12px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 12px;
            cursor: pointer;
        }
        .path-selector, .speed-type-selector {
            display: flex;
            gap: 6px;
            align-items: center;
            background: rgba(22, 33, 62, 0.95);
            padding: 6px 10px;
            border-radius: 4px;
            border: 1px solid #0f3460;
            flex-wrap: wrap;
        }
        .path-selector label, .speed-type-selector label {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            font-size: 11px;
            color: #c5c6c7;
            white-space: nowrap;
        }
        .path-selector input, .speed-type-selector input {
            width: 14px;
            height: 14px;
            cursor: pointer;
            accent-color: #66fcf1;
        }
        .path-selector label:hover, .speed-type-selector label:hover { color: #66fcf1; }
        main { flex: 1; position: relative; background: #000; }
        #canvas-container { width: 100%; height: 100%; cursor: grab; }
        #canvas-container:active { cursor: grabbing; }
        canvas { display: block; }
        .info-panel {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(22, 33, 62, 0.95);
            border: 1px solid #0f3460;
            border-radius: 4px;
            padding: 12px;
            min-width: 220px;
            max-height: 300px;
            overflow-y: auto;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid #1a1a2e;
            font-size: 12px;
        }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: #888; }
        .info-value { color: #66fcf1; font-weight: bold; }
        .legend {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(22, 33, 62, 0.95);
            border: 1px solid #0f3460;
            border-radius: 4px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 11px;
        }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .legend-line { width: 24px; height: 3px; border-radius: 1px; }
        .tooltip {
            position: absolute;
            background: rgba(22, 33, 62, 0.98);
            border: 1px solid #66fcf1;
            border-radius: 4px;
            padding: 12px;
            min-width: 200px;
            font-size: 11px;
            pointer-events: none;
            z-index: 100;
            display: none;
            box-shadow: 0 4px 12px rgba(102, 252, 241, 0.2);
        }
        .tooltip-row {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            border-bottom: 1px solid #1a1a2e;
        }
        .tooltip-row:last-child { border-bottom: none; }
        .tooltip-label { color: #888; margin-right: 12px; }
        .tooltip-value { color: #66fcf1; font-weight: bold; }
        .tooltip-title { color: #fff; font-weight: bold; margin-bottom: 8px; font-size: 12px; }
        .status-bar {
            background: #1a1a2e;
            border-top: 1px solid #0f3460;
            padding: 8px 20px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
        }
        .status-left, .status-right { display: flex; gap: 20px; }
        .loading-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .loading-spinner {
            width: 40px; height: 40px;
            border: 3px solid #16213e;
            border-top-color: #66fcf1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { margin-top: 16px; color: #66fcf1; font-size: 14px; }
        .error-message { color: #ff5555; margin-top: 16px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <h1>КМБУ-ИД</h1>
                <div class="station-name" id="station-display">Загрузка...</div>
            </div>
            <div class="controls">
                <div class="data-selector">
                    <select id="section-select"><option value="">Выберите участок</option></select>
                </div>
                <div class="path-selector" id="path-selector">
                </div>
                <div class="speed-type-selector" id="speed-type-selector">
                    <label><input type="checkbox" name="speed-type" value="пассажирские" checked> Пасс</label>
                    <label><input type="checkbox" name="speed-type" value="грузовые_ускоренные" checked> Груз. уск</label>
                    <label><input type="checkbox" name="speed-type" value="грузовые" checked> Груз</label>
                    <label><input type="checkbox" name="speed-type" value="грузовые_порожние" checked> Груз. пор</label>
                </div>
                <button onclick="renderer.resetView()">Сброс</button>
                <button onclick="renderer.zoomIn()">+</button>
                <button onclick="renderer.zoomOut()">−</button>
            </div>
        </header>
        <main>
            <div id="canvas-container">
                <canvas id="profileCanvas"></canvas>
                <div class="info-panel" id="info-panel">
                    <div class="info-row"><span class="info-label">Позиция:</span><span class="info-value" id="pos-value">-- км</span></div>
                    <div class="info-row"><span class="info-label">Скорость:</span><span class="info-value" id="speed-value">-- км/ч</span></div>
                    <div class="info-row"><span class="info-label">Разрешенная:</span><span class="info-value" id="limit-value">-- км/ч</span></div>
                    <div class="info-row"><span class="info-label">Уклон:</span><span class="info-value" id="gradient-value">--‰</span></div>
                    <div class="info-row"><span class="info-label">Масштаб:</span><span class="info-value" id="zoom-value">--%</span></div>
                </div>
                <div class="legend">
                    <div class="legend-item"><div class="legend-line" style="background: #ff3333;"></div><span>Скорость</span></div>
                    <div class="legend-item"><div class="legend-line" style="background: #00d2ff;"></div><span>Профиль пути</span></div>
                    <div class="legend-item"><div class="legend-line" style="background: #fff; border-top: 2px dashed #fff; height:0;"></div><span>Уклон</span></div>
                </div>
                <div class="tooltip" id="speed-tooltip"></div>
                <div class="loading-overlay" id="loading">
                    <div class="loading-spinner"></div>
                    <div class="loading-text">Загрузка данных...</div>
                </div>
            </div>
        </main>
        <div class="status-bar">
            <div class="status-left"><div class="status-item"><span>ПОЕЗД № 9707</span></div></div>
            <div class="status-right">
                <div class="status-item"><span>1197 м</span></div>
                <div class="status-item"><span>8085 т</span></div>
                <div class="status-item"><span>250 о</span></div>
                <div class="status-item"><span>56 ф</span></div>
                <div class="status-item"><span>79 у</span></div>
            </div>
        </div>
    </div>
    <script src="profile-renderer.js"></script>
</body>
</html>
